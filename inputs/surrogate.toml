[paths]
dataset = "surrogate/dataset.csv"
failed_candidates = "surrogate/failed_candidates.csv"
models_dir = "surrogate/models"
plots_dir = "surrogate/plots"

[data]
aging_cycles = 500
training_ageing_mesh = [1, 2, 5, 10, 20, 50, 100, 150, 200, 250, 300, 350, 400, 450, 500]
trajectory_feature_count = 256

[signals]
time = "Time [s]"
voltage = "Terminal voltage [V]"
current = "Current [A]"

[grid]
x1_charge_rate = [0.01, 0.1, 0.5]
x2_discharge_rate = [0.01, 0.1, 0.5]
x3_rest_minutes = [0.1, 60.0]
x4_num_cycles = [1, 3]

[random_forest]
n_estimators = 400
min_samples_leaf = 2
random_state = 42
n_jobs = -1

[split]
test_fraction = 0.15
validation_fraction_of_train = 0.18
test_random_state = 42
validation_random_state = 43
